name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dependency sources
        id: cache-sources
        uses: actions/cache@v4
        with:
          path: |
            deps/opencv
            deps/libharu
          key: scanwise-sources-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}-opencv-4.11.0-libharu-2.4.4

      - name: Clone OpenCV
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: git clone --branch 4.11.0 --depth 1 https://github.com/opencv/opencv.git deps/opencv

      - name: Clone libharu
        if: steps.cache-sources.outputs.cache-hit != 'true'
        run: git clone --branch v2.4.4 --depth 1 https://github.com/libharu/libharu.git deps/libharu

      - name: Cache build outputs
        id: cache-build
        uses: actions/cache@v4
        with:
          path: out/build/release/deps
          key: scanwise-build-${{ runner.os }}-${{ hashFiles('CMakeLists.txt', 'app/CMakeLists.txt', 'engine/**/*', 'app/winui/**/*') }}-opencv-4.11.0-libharu-2.4.4

      - name: Download NuGet
        run: |
          New-Item -ItemType Directory -Force -Path deps | Out-Null
          Invoke-WebRequest -Uri https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile deps/nuget.exe

      - name: Restore NuGet packages
        run: |
          deps/nuget.exe install Microsoft.WindowsAppSDK -Version 1.6.250602001 -OutputDirectory deps/nuget
          deps/nuget.exe install Microsoft.Windows.CppWinRT -Version 3.0.260520.1 -OutputDirectory deps/nuget
          deps/nuget.exe install Microsoft.Web.WebView2 -Version 1.0.2651.64 -OutputDirectory deps/nuget

      - name: Configure
        run: ./configure_release.ps1

      - name: Build
        run: ./build_release.ps1

      - name: Run engine tests
        run: ./out/build/release/bin/scanwise_engine_tests.exe

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ScanWise-Release
          path: out/build/release/bin/
          if-no-files-found: error
